name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=vision-friendly-dark
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=vision-friendly-dark
          path: profile/languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git stash
          git pull --rebase origin ${{ github.ref_name }}
          git stash pop || echo "No stash to pop"
          git add profile/*.svg
          git commit -m "Update README cards [skip ci]" || exit 0
          git push
